name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
        timeout-minutes: 5

      - name: Integration tests
        run: npm run test:integration
        timeout-minutes: 10

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm run test:security
