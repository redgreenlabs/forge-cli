name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: node --max-old-space-size=4096 ./node_modules/.bin/vitest run
        timeout-minutes: 5

      - name: Integration tests
        run: node --max-old-space-size=4096 ./node_modules/.bin/vitest run tests/integration/ --testTimeout=300000
        timeout-minutes: 10

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm run test:security
