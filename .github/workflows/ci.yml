name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: timeout 120 npx vitest run --reporter=json --outputFile=unit-results.json; node -e "const r=require('./unit-results.json');console.log(r.numPassedTests+'/'+r.testResults.length+' passed');if(r.numFailedTests>0)process.exit(1)"
        timeout-minutes: 5

      - name: Integration tests
        run: timeout 540 npx vitest run tests/integration/ --testTimeout=300000 --reporter=json --outputFile=int-results.json; node -e "const r=require('./int-results.json');console.log(r.numPassedTests+'/'+r.testResults.length+' passed');if(r.numFailedTests>0)process.exit(1)"
        timeout-minutes: 10

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm run test:security
