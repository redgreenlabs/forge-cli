name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run --pool=forks --reporter=verbose
        timeout-minutes: 5
        env:
          CI: true

      - name: Integration tests
        run: npx vitest run tests/integration/ --pool=forks --testTimeout=300000 --reporter=verbose
        timeout-minutes: 10
        env:
          CI: true

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm run test:security
